<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiết Công Việc — SmartJob</title>
  <meta name="description" content="Xem chi tiết công việc và ứng tuyển trực tiếp trên Tuyển Dụng.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="page-wrapper">
    <div class="max-w-7xl mx-auto px-5 py-[60px]" style="padding-top:32px">
      <!-- Back link -->
      <a href="/jobs.html" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-black/5 text-slate-500 border border-slate-200 text-[13px] font-semibold rounded-lg transition-all hover:-translate-y-0.5 hover:text-primary cursor-pointer whitespace-nowrap !px-3 !py-1.5 !text-xs !rounded-md mb-6" style="display:inline-flex">‹ Quay lại danh sách</a>

      <div id="loadingState" class="text-center" style="padding:80px 0">
        <div class="loading-spinner" style="margin:0 auto 16px"></div>
        <p class="text-slate-500 text-[13px]">Đang tải thông tin...</p>
      </div>

      <div id="jobContent" style="display:none">
        <div style="display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start">
          <!-- Left: Job Detail -->
          <div>
            <!-- Job Header -->
            <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden transition-all hover:border-primary/40 hover:-translate-y-1 hover:shadow-lg mb-6">
              <div class="p-6">
                <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px">
                  <div class="company-logo" style="width:64px;height:64px;font-size:24px;border-radius:16px" id="companyLogo"></div>
                  <div style="flex:1">
                    <h1 id="jobTitle" style="font-size:24px;margin-bottom:6px"></h1>
                    <div id="companyName" style="font-size:15px;color:var(--text-slate-600);margin-bottom:12px"></div>
                    <div style="display:flex;flex-wrap:wrap;gap:10px" id="jobMeta"></div>
                  </div>
                </div>

                <!-- Skill Tags -->
                <div>
                  <div class="text-slate-500 text-[13px] mb-8"> Kỹ năng yêu cầu</div>
                  <div id="jobSkills" class="job-card-skills"></div>
                </div>
              </div>
            </div>

            <!-- Tabs -->
            <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden transition-all hover:border-primary/40 hover:-translate-y-1 hover:shadow-lg">
              <div class="p-6">
                <div class="tabs">
                  <button class="tab-btn active" onclick="switchTab('mo_ta', this)"> Mô tả</button>
                  <button class="tab-btn" onclick="switchTab('yeu_cau', this)"> Yêu cầu</button>
                  <button class="tab-btn" onclick="switchTab('quyen_loi', this)">🎁 Quyền lợi</button>
                  <button class="tab-btn" onclick="switchTab('cong_ty', this)"> Công ty</button>
                </div>

                <div id="tab_mo_ta" class="tab-panel active">
                  <div id="moTaContent" style="line-height:1.8;color:var(--text-slate-600)"></div>
                </div>
                <div id="tab_yeu_cau" class="tab-panel">
                  <div id="yeuCauContent" style="line-height:1.8;color:var(--text-slate-600)"></div>
                </div>
                <div id="tab_quyen_loi" class="tab-panel">
                  <div id="quyenLoiContent" style="line-height:1.8;color:var(--text-slate-600)"></div>
                </div>
                <div id="tab_cong_ty" class="tab-panel">
                  <div id="congTyContent"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Right: Apply Box -->
          <div style="position:sticky;top:84px">
            <!-- Salary & Apply -->
            <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden transition-all hover:border-primary/40 hover:-translate-y-1 hover:shadow-lg mb-6">
              <div class="p-6">
                <div style="font-size:13px;color:var(--text-slate-500);margin-bottom:4px">Mức lương</div>
                <div id="salaryDisplay" style="font-size:22px;font-weight:800;margin-bottom:20px" class="text-primary"></div>

                <div id="applySection">
                  <button id="applyBtn" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-primary text-white text-[13px] font-semibold rounded-lg shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md cursor-pointer whitespace-nowrap w-full !flex !px-7 !py-3.5 !text-base mb-8" onclick="openApplyModal()">
                     Ứng Tuyển Ngay
                  </button>
                  <button id="saveBtn" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-black/5 text-slate-500 border border-slate-200 text-[13px] font-semibold rounded-lg transition-all hover:-translate-y-0.5 hover:text-primary cursor-pointer whitespace-nowrap w-full !flex" onclick="toggleSaveJob()">
                    🔖 Lưu công việc
                  </button>
                </div>

                <div id="appliedBadge" class="badge bg-emerald-500/15 text-emerald-500 border border-emerald-500/30 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium" style="display:none;width:100%;justify-content:center;padding:14px;border-radius:10px">
                   Bạn đã ứng tuyển công việc này
                </div>

                <hr class="border-0 border-t border-slate-200 my-6">

                <div id="jobStats" style="display:flex;flex-direction:column;gap:10px;font-size:13px"></div>
              </div>
            </div>

            <!-- Share -->
            <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden transition-all hover:border-primary/40 hover:-translate-y-1 hover:shadow-lg">
              <div class="p-6">
                <div class="font-bold mb-8" style="font-size:14px">📤 Chia sẻ</div>
                <button class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-black/5 text-slate-500 border border-slate-200 text-[13px] font-semibold rounded-lg transition-all hover:-translate-y-0.5 hover:text-primary cursor-pointer whitespace-nowrap !px-3 !py-1.5 !text-xs !rounded-md w-full !flex" onclick="copyLink()">🔗 Sao chép liên kết</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="errorState" style="display:none" class="empty-state">
        <div class="empty-state-icon">😕</div>
        <div class="empty-state-title">Không tìm thấy công việc</div>
        <a href="/jobs.html" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-primary text-white text-[13px] font-semibold rounded-lg shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md cursor-pointer whitespace-nowrap mt-6">Quay lại danh sách</a>
      </div>
    </div>
  </div>

  <!-- Apply Modal -->
  <div class="modal-overlay" id="applyModal">
    <div class="modal">
      <div class="modal-header">
        <h3> Ứng Tuyển Công Việc</h3>
        <button class="modal-close" onclick="closeApplyModal()">✕</button>
      </div>

      <div id="modalJobInfo" style="background:rgba(99,102,241,0.08);border-radius:var(--radius-md);padding:16px;margin-bottom:24px"></div>

      <form onsubmit="submitApply(event)">
        <div class="mb-5">
          <label class="block text-[13px] font-semibold text-slate-500 mb-2 uppercase tracking-wide">Thư giới thiệu (tùy chọn)</label>
          <textarea id="thuGioiThieu" class="w-full px-4 py-3 bg-white border-[1.5px] border-slate-200 rounded-xl text-slate-900 text-[14px] transition-all hover:border-primary/50 focus:border-primary focus:ring-[3px] focus:ring-primary/15 outline-none" rows="4"
            placeholder="Giới thiệu bản thân, lý do bạn phù hợp với vị trí này..."></textarea>
        </div>

        <div class="mb-5">
          <label class="block text-[13px] font-semibold text-slate-500 mb-2 uppercase tracking-wide">📎 File CV (tùy chọn)</label>
          <label id="cvDropZone" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;border:2px dashed #e2e8f0;border-radius:12px;cursor:pointer;transition:all 0.2s;background:#fafafa"
            onmouseover="this.style.borderColor='#6366f1';this.style.background='rgba(99,102,241,0.04)'"
            onmouseout="this.style.borderColor='#e2e8f0';this.style.background='#fafafa'">
            <input type="file" id="cvFile" accept=".doc,.docx" style="display:none" onchange="handleCVFile(this)">
            <span style="font-size:28px">📄</span>
            <span style="font-size:13px;font-weight:600;color:#64748b">Kéo thả hoặc click để tải lên</span>
            <span style="font-size:12px;color:#94a3b8">Hỗ trợ .doc, .docx (tối đa 5MB)</span>
          </label>
          <div id="cvFileInfo" style="display:none;margin-top:8px;padding:10px 14px;background:rgba(99,102,241,0.08);border-radius:10px;display:none;align-items:center;justify-content:space-between">
            <span id="cvFileName" style="font-size:13px;font-weight:600;color:#6366f1">📄</span>
            <button type="button" onclick="removeCVFile()" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:16px">✕</button>
          </div>
        </div>

        <div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:var(--radius-md);padding:12px;margin-bottom:20px;font-size:13px;color:var(--success)">
           Nhà tuyển dụng sẽ xem hồ sơ và kỹ năng của bạn. Hãy đảm bảo hồ sơ đã được cập nhật!
        </div>

        <div style="display:flex;gap:12px">
          <button type="button" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-black/5 text-slate-500 border border-slate-200 text-[13px] font-semibold rounded-lg transition-all hover:-translate-y-0.5 hover:text-primary cursor-pointer whitespace-nowrap" style="flex:1" onclick="closeApplyModal()">Hủy</button>
          <button type="submit" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-primary text-white text-[13px] font-semibold rounded-lg shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md cursor-pointer whitespace-nowrap" style="flex:2" id="submitApplyBtn"> Nộp hồ sơ</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    const jobId = new URLSearchParams(window.location.search).get('id');
    let currentJob = null;
    let isSaved = false;

    if (!jobId) window.location.href = '/jobs.html';

    async function loadJobDetail() {
      try {
        const data = await API.jobs.getById(jobId);
        currentJob = data.job;
        renderJobDetail(data.job);

        // Check apply & save status if logged in
        if (isLoggedIn()) {
          checkApplyStatus();
        }
      } catch (e) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
      }
    }

    function renderJobDetail(job) {
      document.title = `${job.tieu_de} — ${job.ten_cong_ty} | Tuyển Dụng`;
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('jobContent').style.display = 'block';

      document.getElementById('companyLogo').textContent = getInitials(job.ten_cong_ty);
      document.getElementById('jobTitle').textContent = job.tieu_de;
      document.getElementById('companyName').innerHTML = ` <strong>${job.ten_cong_ty}</strong>${job.cong_ty_dia_chi ? ' — ' + job.cong_ty_dia_chi : ''}`;

      // Badges
      const typeBadgeMap = { toan_thoi_gian: 'bg-primary/15 text-primary-light border border-primary/30 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium', ban_thoi_gian: 'bg-amber-500/15 text-amber-500 border border-amber-500/30 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium', tu_do: 'bg-cyan-500/15 text-cyan-500 border border-cyan-500/30 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium', thuc_tap: 'bg-emerald-500/15 text-emerald-500 border border-emerald-500/30 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium' };
      document.getElementById('jobMeta').innerHTML = `
        <span class="badge ${typeBadgeMap[job.loai_hinh] || 'bg-black/5 text-slate-500 border border-slate-200 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium'}"> ${getJobTypeLabel(job.loai_hinh)}</span>
        <span class="badge bg-black/5 text-slate-500 border border-slate-200 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium"> ${job.dia_chi || 'Linh hoạt'}</span>
        ${job.han_nop ? `<span class="badge bg-amber-500/15 text-amber-500 border border-amber-500/30 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium">📅 HSD: ${formatDate(job.han_nop)}</span>` : ''}
        <span class="badge bg-black/5 text-slate-500 border border-slate-200 inline-flex items-center px-2.5 py-1 rounded-full text-[12px] font-medium">👁 ${job.luot_xem || 0} lượt xem</span>
      `;

      // Skills
      const skillsHtml = (job.ky_nang || []).map(s => `
        <span class="skill-tag" title="Yêu cầu mức ${s.muc_do_yeu_cau}/5">${s.ten_ky_nang} <span style="opacity:0.6;font-size:10px">Lv.${s.muc_do_yeu_cau}</span></span>
      `).join('');
      document.getElementById('jobSkills').innerHTML = skillsHtml || '<span class="text-slate-500 text-[13px]">Chưa có thông tin kỹ năng</span>';

      // Salary
      document.getElementById('salaryDisplay').textContent = formatSalary(job.muc_luong_min, job.muc_luong_max);

      // Stats
      document.getElementById('jobStats').innerHTML = `
        <div class="flex items-center justify-between"><span class="text-slate-500 text-[13px]">Ngày đăng</span><span>${formatDate(job.ngay_tao)}</span></div>
        <div class="flex items-center justify-between"><span class="text-slate-500 text-[13px]">Hạn nộp</span><span>${job.han_nop ? formatDate(job.han_nop) : 'Không giới hạn'}</span></div>
        <div class="flex items-center justify-between"><span class="text-slate-500 text-[13px]">Ứng tuyển</span><span>${job.so_luong_ung_tuyen || 0} người</span></div>
        <div class="flex items-center justify-between"><span class="text-slate-500 text-[13px]">Quy mô</span><span>${job.quy_mo || 'N/A'}</span></div>
      `;

      // Tab content
      document.getElementById('moTaContent').innerHTML = formatText(job.mo_ta);
      document.getElementById('yeuCauContent').innerHTML = formatText(job.yeu_cau);
      document.getElementById('quyenLoiContent').innerHTML = formatText(job.quyen_loi);
      document.getElementById('congTyContent').innerHTML = `
        <div style="display:flex;gap:16px;align-items:center;margin-bottom:16px">
          <div class="company-logo" style="width:56px;height:56px;font-size:20px">${getInitials(job.ten_cong_ty)}</div>
          <div>
            <div style="font-size:18px;font-weight:700">${job.ten_cong_ty}</div>
            ${job.quy_mo ? `<div class="text-slate-500 text-[13px]"> ${job.quy_mo}</div>` : ''}
          </div>
        </div>
        ${job.cong_ty_mo_ta ? `<p style="color:var(--text-slate-600);line-height:1.8;margin-bottom:16px">${job.cong_ty_mo_ta}</p>` : ''}
        <div style="display:flex;flex-direction:column;gap:8px;font-size:13px">
          ${job.cong_ty_dia_chi ? `<div> <span class="text-slate-500 text-[13px]">Địa chỉ:</span> ${job.cong_ty_dia_chi}</div>` : ''}
          ${job.website ? `<div> <span class="text-slate-500 text-[13px]">Website:</span> <a href="https://${job.website}" target="_blank" style="color:var(--primary-light)">${job.website}</a></div>` : ''}
        </div>
      `;
    }

    async function checkApplyStatus() {
      try {
        const data = await API.apply.check(jobId);
        if (data.applied) {
          document.getElementById('applyBtn').style.display = 'none';
          document.getElementById('appliedBadge').style.display = 'flex';
          document.getElementById('appliedBadge').style.width = '100%';
          document.getElementById('appliedBadge').style.padding = '14px';
          document.getElementById('appliedBadge').style.borderRadius = '10px';
          document.getElementById('appliedBadge').style.justifyContent = 'center';
        }
      } catch(e) {}
    }

    function formatText(text) {
      if (!text) return '<p class="text-slate-500 text-[13px]">Chưa có thông tin.</p>';
      return text.split('\n').map(line => line.trim() ? `<p style="margin-bottom:8px;color:var(--text-slate-600)">${line}</p>` : '').join('');
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      if (btn) btn.classList.add('active');
      document.getElementById('tab_' + name).classList.add('active');
    }

    function openApplyModal() {
      if (!requireAuth()) return;
      document.getElementById('modalJobInfo').innerHTML = currentJob ? `
        <div style="font-weight:700;margin-bottom:4px">${currentJob.tieu_de}</div>
        <div class="text-slate-500 text-[13px]"> ${currentJob.ten_cong_ty}</div>
      ` : '';
      document.getElementById('applyModal').classList.add('active');
    }

    function closeApplyModal() {
      document.getElementById('applyModal').classList.remove('active');
    }

    async function submitApply(e) {
      e.preventDefault();
      const btn = document.getElementById('submitApplyBtn');
      btn.disabled = true;
      btn.textContent = 'Đang nộp...';

      try {
        const thu = document.getElementById('thuGioiThieu').value;
        const payload = { thu_gioi_thieu: thu };

        // Đính kèm file CV nếu có
        if (cvFileData) {
          payload.cv_file_name = cvFileName;
          payload.cv_file_data = cvFileData;
        }

        await API.apply.apply(jobId, payload);
        closeApplyModal();
        showToast('Ứng tuyển thành công! Chúc bạn may mắn ', 'success');
        document.getElementById('applyBtn').style.display = 'none';
        document.getElementById('appliedBadge').style.display = 'flex';
      } catch (err) {
        showToast(err.message || 'Ứng tuyển thất bại.', 'error');
        btn.disabled = false;
        btn.textContent = ' Nộp hồ sơ';
      }
    }

    let cvFileData = null;
    let cvFileName = null;

    function handleCVFile(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        showToast('File quá lớn, tối đa 5MB.', 'error');
        input.value = '';
        return;
      }
      cvFileName = file.name;
      const reader = new FileReader();
      reader.onload = function(e) {
        // Lấy base64 (bỏ phần "data:...;base64,")
        cvFileData = e.target.result.split(',')[1];
        document.getElementById('cvFileName').textContent = '📄 ' + file.name;
        document.getElementById('cvFileInfo').style.display = 'flex';
        document.getElementById('cvDropZone').style.borderColor = '#6366f1';
        document.getElementById('cvDropZone').style.background = 'rgba(99,102,241,0.04)';
      };
      reader.readAsDataURL(file);
    }

    function removeCVFile() {
      cvFileData = null;
      cvFileName = null;
      document.getElementById('cvFile').value = '';
      document.getElementById('cvFileInfo').style.display = 'none';
      document.getElementById('cvDropZone').style.borderColor = '#e2e8f0';
      document.getElementById('cvDropZone').style.background = '#fafafa';
    }

    async function toggleSaveJob() {
      if (!requireAuth()) return;
      try {
        if (isSaved) {
          await API.users.unsaveJob(jobId);
          isSaved = false;
          document.getElementById('saveBtn').textContent = '🔖 Lưu công việc';
          showToast('Đã bỏ lưu.', 'info');
        } else {
          await API.users.saveJob(jobId);
          isSaved = true;
          document.getElementById('saveBtn').textContent = ' Đã lưu';
          showToast('Đã lưu công việc!', 'success');
        }
      } catch(e) { showToast('Lỗi. Vui lòng thử lại.', 'error'); }
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href);
      showToast('Đã sao chép liên kết!', 'success');
    }

    // Close modal on overlay click
    document.getElementById('applyModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeApplyModal();
    });

    loadJobDetail();
  </script>
</body>
</html>
