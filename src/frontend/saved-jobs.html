<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Việc Làm Đã Lưu — SmartJob</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="page-wrapper">
    <div style="background:var(--bg-surface);border-bottom:1px solid var(--border);padding:32px 0">
      <div class="max-w-7xl mx-auto px-5">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <div>
            <h1 style="font-size:28px;margin-bottom:6px">Việc Làm <span class="text-primary">Đã Lưu</span></h1>
            <p class="text-slate-500 text-[13px]">Danh sách công việc bạn đã đánh dấu lưu lại</p>
          </div>
          <a href="/jobs.html" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-black/5 text-slate-500 border border-slate-200 text-[13px] font-semibold rounded-lg transition-all hover:-translate-y-0.5 hover:text-primary cursor-pointer whitespace-nowrap">💼 Tìm thêm việc làm</a>
        </div>
      </div>
    </div>

    <div class="max-w-7xl mx-auto px-5" style="padding-top:28px;padding-bottom:60px">
      <!-- Loading -->
      <div id="loadingSection" class="text-center" style="padding:60px 0">
        <div class="loading-spinner" style="margin:0 auto 16px"></div>
        <p class="text-slate-500 text-[13px]">Đang tải...</p>
      </div>

      <!-- List -->
      <div id="jobsList" style="display:none;flex-direction:column;gap:14px"></div>

      <!-- Empty -->
      <div id="emptySection" style="display:none">
        <div class="empty-state">
          <div class="empty-state-icon">🔖</div>
          <div class="empty-state-title">Chưa lưu việc làm nào</div>
          <p class="empty-state-desc">Nhấn nút "Lưu công việc" khi xem chi tiết để lưu lại các vị trí bạn quan tâm.</p>
          <a href="/jobs.html" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-primary text-white text-[13px] font-semibold rounded-lg shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md cursor-pointer whitespace-nowrap mt-6">💼 Khám phá việc làm</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    if (!requireAuth()) {}

    async function loadSavedJobs() {
      try {
        const data = await API.users.getSavedJobs();
        const jobs = data.savedJobs || [];
        document.getElementById('loadingSection').style.display = 'none';

        if (!jobs.length) {
          document.getElementById('emptySection').style.display = 'block';
          return;
        }

        const list = document.getElementById('jobsList');
        list.style.display = 'flex';
        list.innerHTML = jobs.map((j, i) => `
          <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden transition-all hover:border-primary/40 hover:-translate-y-1 hover:shadow-lg animate-fadeInUp" style="animation-delay:${i*0.04}s">
            <div class="p-6">
              <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
                <div class="company-logo" style="width:52px;height:52px;font-size:20px;flex-shrink:0;border-radius:12px">
                  ${j.logo ? `<img src="${j.logo}" style="width:100%;height:100%;object-fit:contain;border-radius:12px">` : `<span>${getInitials(j.ten_cong_ty)}</span>`}
                </div>
                <div style="flex:1;min-width:200px">
                  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px">
                    <div>
                      <a href="/job-detail.html?id=${j.id}" style="font-size:17px;font-weight:700;color:var(--text-primary);text-decoration:none;transition:0.2s" onmouseover="this.style.color='var(--primary-light)'" onmouseout="this.style.color='var(--text-primary)'">${j.tieu_de}</a>
                      <div class="text-slate-500 text-[13px]" style="margin-top:4px"> ${j.ten_cong_ty}</div>
                    </div>
                    <span style="background:${j.trang_thai==='dang_tuyen'?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)'};color:${j.trang_thai==='dang_tuyen'?'#10b981':'#ef4444'};border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;flex-shrink:0">${j.trang_thai==='dang_tuyen'?'🟢 Đang tuyển':'🔴 Đã đóng'}</span>
                  </div>

                  <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px">
                    <span class="text-slate-500 text-[13px]"> ${formatSalary(j.muc_luong_min, j.muc_luong_max)}</span>
                    ${j.dia_chi ? `<span class="text-slate-500 text-[13px]"> ${j.dia_chi}</span>` : ''}
                    <span class="text-slate-500 text-[13px]"> ${getJobTypeLabel(j.loai_hinh)}</span>
                    <span class="text-slate-500 text-[13px]">🔖 Lưu: ${formatRelativeTime(j.ngay_luu)}</span>
                  </div>

                  <div style="display:flex;gap:8px;flex-wrap:wrap">
                    <a href="/job-detail.html?id=${j.id}" class="inline-flex items-center justify-center gap-8 px-5 py-2.5 bg-primary text-white text-[13px] font-semibold rounded-lg shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md cursor-pointer whitespace-nowrap" style="padding:7px 16px">Xem chi tiết</a>
                    <button onclick="unsaveJob(${j.id}, this)" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#ef4444;font-weight:600">🗑️ Bỏ lưu</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('loadingSection').style.display = 'none';
        showToast('Không tải được dữ liệu.', 'error');
      }
    }

    async function unsaveJob(jobId, btn) {
      btn.disabled = true;
      try {
        await API.users.unsaveJob(jobId);
        showToast('Đã bỏ lưu công việc.', 'success');
        loadSavedJobs();
      } catch(e) {
        showToast('Thất bại.', 'error');
        btn.disabled = false;
      }
    }

    loadSavedJobs();
  </script>
</body>
</html>
""
